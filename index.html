<!DOCTYPE html>
<html lang="ru">
  <head>
    <title><%= productName %></title>

    <meta charset="utf-8">
    <meta name="description" content="<%= productDescription %>">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>">

    <!-- Сайт-уровневые мета (статичные). Динамическое OG под конкретную трассу невозможно без SSR — §11.5. -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Crux">
    <meta property="og:title" content="Crux — конструктор скалолазных трасс">
    <meta property="og:description" content="Соберите, сохраните и поделитесь скалолазной boulder-трассой на тренировочной доске. Офлайн-first, без бэкенда.">
    <meta property="og:url" content="https://arbaev.github.io/crux/">
    <meta property="og:image" content="https://arbaev.github.io/crux/icons/web-app-manifest-512x512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Crux — конструктор скалолазных трасс">
    <meta name="twitter:description" content="Соберите, сохраните и поделитесь скалолазной boulder-трассой на тренировочной доске.">
    <meta name="twitter:image" content="https://arbaev.github.io/crux/icons/web-app-manifest-512x512.png">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

    <!-- injectPwaMetaTags выключен: theme-color задаём вручную; manifest-link инжектит Quasar с base /crux/ -->
    <meta name="theme-color" content="#1976D2">
  </head>
  <body>
    <!-- quasar:entry-point -->
  </body>
</html>

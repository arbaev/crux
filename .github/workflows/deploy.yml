name: Deploy to GitHub Pages

# Деплой статики dist/pwa на GitHub Pages из публичного репо (без PAT — через GITHUB_TOKEN).
# Один раз включить: Settings → Pages → Source = GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Запускаем JS-actions на Node.js 24 (Node 20 в GitHub Actions deprecated, форс с 16.06.2026).
# Официальный опт-ин — закрывает ворнинг сразу для всех actions без подбора версий.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Включает GitHub Pages и выставляет источник = GitHub Actions (если ещё не включён).
      # Если выдаёт ошибку прав — включи вручную: Settings → Pages → Source = GitHub Actions.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec quasar build -m pwa

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pwa

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
